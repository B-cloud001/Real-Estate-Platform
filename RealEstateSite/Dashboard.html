<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landlord Dashboard - ZeyRi Homes</title>
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Arial, sans-serif; }
  body{ background:#f4f6fb; min-height:100vh; display:flex; }

  /* Sidebar */
  .sidebar{
    width:230px;
    background: hsl(220, 60%, 20%);
    color:whitesmoke;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:20px 0;
    position:fixed;
  }
  .sidebar .logo{
    padding:0 20px 25px 20px;
    font-size:18px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    margin-bottom:15px;
  }
  .sidebar nav a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 20px;
    color:whitesmoke;
    text-decoration:none;
    font-size:14px;
    transition: background-color 0.2s ease, padding-left 0.2s ease;
    cursor:pointer;
  }
  .sidebar nav a:hover, .sidebar nav a.active{
    background: rgb(18,18,65);
    padding-left:26px;
  }
  .sidebar .logout-link{
    margin-top:auto;
    border-top:1px solid rgba(255,255,255,0.1);
  }

  /* Main content */
  .main{
    margin-left:230px;
    padding:30px 40px;
    width:100%;
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
  }
  .topbar h1{ color: rgb(18,18,65); font-size:22px; }
  .topbar .welcome{ color:#666; font-size:14px; }

  /* Summary cards */
  .summary-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    margin-bottom:35px;
  }
  .summary-card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
    opacity:0;
    transform:translateY(15px);
    animation: fadeUp 0.5s ease forwards;
  }
  .summary-card i{ font-size:26px; color: rgb(18,18,65); margin-bottom:10px; display:block; }
  .summary-card .num{ font-size:26px; font-weight:bold; color: rgb(18,18,65); }
  .summary-card .label{ font-size:13px; color:#777; margin-top:4px; }

  /* Section toggle */
  .section{ display:none; }
  .section.active{ display:block; }

  .section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
  }
  .section-header h2{ color: rgb(18,18,65); font-size:19px; }

  .btn-primary{
    background: rgb(18,18,65);
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    transition: background-color 0.2s ease, transform 0.15s ease;
  }
  .btn-primary:hover{ background: rgb(30,30,100); transform:scale(1.03); }

  /* Property cards */
  .property-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:20px;
  }
  .property-card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    opacity:0;
    transform:translateY(15px);
    animation: fadeUp 0.5s ease forwards;
  }
  .property-card:hover{ transform:translateY(-6px); box-shadow:0 12px 24px rgba(18,18,65,0.15); }
  .property-card .thumb{
    height:130px;
    background: linear-gradient(135deg, rgb(18,18,65), rgb(50,50,120));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:30px;
    position: relative;
  }
  .property-card .body{ padding:15px; }
  .property-card h3{ font-size:15px; color: rgb(18,18,65); margin-bottom:4px; }
  .property-card .price{ font-weight:bold; color:#222; margin-bottom:6px; }
  .property-card .meta{ font-size:12px; color:#777; margin-bottom:10px; }
  .property-card .status-badge{
    display:inline-block;
    font-size:11px;
    padding:3px 10px;
    border-radius:12px;
    margin-bottom:10px;
    background:#e6ebfa;
    color: rgb(18,18,65);
  }
  .property-card .card-actions{ display:flex; gap:8px; }
  .property-card .card-actions button{
    flex:1;
    padding:6px;
    font-size:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
  }
  .card-actions .delete-btn{ background:#fdeaea; color:#c0392b; }
  .card-actions .delete-btn:hover{ background:#f8d3d3; }

  .empty-state{
    text-align:center;
    color:#888;
    padding:40px 20px;
    background:#fff;
    border-radius:10px;
  }

  /* Modal for add property */
  .overlay{
    display:none;
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    align-items:center; justify-content:center;
    z-index:999;
  }
  .overlay.active{ display:flex; }
  .modal{
    background:#fff;
    width:400px;
    max-width:90%;
    padding:30px;
    border-radius:12px;
    animation: popIn 0.25s ease;
    max-height: 88vh;
    overflow-y: auto;
  }
  @keyframes popIn{ from{opacity:0; transform:scale(0.9);} to{opacity:1; transform:scale(1);} }
  .modal h2{ color: rgb(18,18,65); margin-bottom:18px; }
  .modal .field{ margin-bottom:14px; }
  .modal label{ font-size:13px; color:#555; display:block; margin-bottom:5px; }
  .modal input, .modal select{
    width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:14px;
  }
  .modal .field-row{ display:flex; gap:10px; }
  .modal .modal-actions{ display:flex; gap:10px; margin-top:20px; }
  .modal .modal-actions button{ flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-size:14px; }
  .modal .cancel-btn{ background:#eee; color:#333; }
  .modal .save-btn{ background: rgb(18,18,65); color:#fff; }

  /* Tenant table */
  table{ width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; }
  th, td{ padding:14px; text-align:left; font-size:14px; }
  th{ background: rgb(18,18,65); color:#fff; font-weight:normal; }
  tr:nth-child(even){ background:#f9fafc; }
  .rent-status{ padding:4px 10px; border-radius:12px; font-size:12px; }
  .rent-status.paid{ background:#e3f7e9; color:#1e8449; }
  .rent-status.pending{ background:#fff5e0; color:#b8860b; }
  .rent-status.overdue{ background:#fdeaea; color:#c0392b; }

  @keyframes fadeUp{ from{opacity:0; transform:translateY(15px);} to{opacity:1; transform:translateY(0);} }

  /* Toast notification */
  .toast{
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgb(18,18,65);
    color: #fff;
    padding: 14px 24px;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 2000;
    max-width: 90%;
    text-align: center;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Application cards */
  .application-card{
    background:#fff;
    border-radius:10px;
    padding:18px 20px;
    margin-bottom:14px;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    opacity:0;
    transform:translateY(15px);
    animation: fadeUp 0.5s ease forwards;
  }
  .application-card .info h3{ font-size:15px; color: rgb(18,18,65); margin-bottom:4px; }
  .application-card .info p{ font-size:13px; color:#666; margin-bottom:2px; }
  .application-card .actions{ display:flex; gap:8px; flex-shrink:0; }
  .application-card .actions button{
    padding:8px 16px;
    border:none;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
    transition: transform 0.15s ease;
  }
  .application-card .actions button:hover{ transform: scale(1.05); }
  .approve-btn{ background:#e3f7e9; color:#1e8449; }
  .reject-btn{ background:#fdeaea; color:#c0392b; }
  .status-tag{
    font-size:12px;
    padding:4px 12px;
    border-radius:12px;
    font-weight:bold;
  }
  .status-tag.approved{ background:#e3f7e9; color:#1e8449; }
  .status-tag.rejected{ background:#fdeaea; color:#c0392b; }

  /* ===== Mobile Responsiveness ===== */
  .dash-toggle{
    display: none;
    cursor: pointer;
    font-size: 26px;
    color: rgb(18,18,65);
    margin-right: 15px;
  }
  .topbar-left{
    display: flex;
    align-items: center;
  }
  .sidebar-backdrop{
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: 1400;
  }
  .sidebar-backdrop.show{ display: block; }

  @media (max-width: 900px){
    .sidebar{
      width: 230px;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 1500;
    }
    .sidebar.show{
      transform: translateX(0);
    }
    .sidebar .logo{ display: block; }
    .sidebar nav a span{ display: inline; }
    .sidebar nav a{ justify-content: flex-start; padding: 12px 20px; }
    .main{ margin-left: 0; padding: 20px; }
    .dash-toggle{ display: block; }
    .summary-grid{ grid-template-columns: repeat(2, 1fr); }
    .property-grid{ grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }

  @media (max-width: 480px){
    .summary-grid{ grid-template-columns: 1fr; }
    .property-grid{ grid-template-columns: 1fr; }
    .main{ padding: 15px; }
    .topbar{ flex-direction: row; align-items: center; gap: 8px; }
    table{ display: block; overflow-x: auto; white-space: nowrap; }
    .application-card{ flex-direction: column; align-items: flex-start; gap: 12px; }
    .application-card .actions{ width: 100%; }
    .application-card .actions button{ flex: 1; }
    .modal{ width: 100%; padding: 20px; }
    .modal .field-row{ flex-direction: column; gap: 0; }
  }
</style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="sidebar" id="sidebar">
  <div class="logo">ZeyRi Homes<br><span style="font-size:12px; opacity:0.7;">Landlord Panel</span></div>
  <nav>
    <a data-target="overview" class="active"><i class='bx bx-grid-alt'></i> <span>Overview</span></a>
    <a data-target="properties"><i class='bx bx-building'></i> <span>My Properties</span></a>
    <a data-target="applications"><i class='bx bx-file'></i> <span>Applications</span></a>
    <a data-target="tenants"><i class='bx bx-group'></i> <span>Tenants</span></a>
    <a href="index.html"><i class='bx bx-home-alt'></i> <span>Back to Site</span></a>
    <div class="logout-link">
      <a id="logoutBtn"><i class='bx bx-log-out'></i> <span>Log Out</span></a>
    </div>
  </nav>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="dash-toggle" id="dashToggle"><i class='bx bx-menu'></i></div>
      <div>
        <h1>Dashboard</h1>
        <p class="welcome" id="welcomeMsg">Welcome back!</p>
      </div>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card"><i class='bx bx-building-house'></i><div class="num" id="statProperties">0</div><div class="label">Properties Listed</div></div>
    <div class="summary-card"><i class='bx bx-group'></i><div class="num" id="statTenants">0</div><div class="label">Active Tenants</div></div>
    <div class="summary-card"><i class='bx bx-dollar-circle'></i><div class="num">$0</div><div class="label">Rent Collected (placeholder)</div></div>
    <div class="summary-card"><i class='bx bx-file'></i><div class="num" id="statApplications">0</div><div class="label">Pending Applications</div></div>
  </div>

  <!-- Overview -->
  <div class="section active" id="overview">
    <div class="section-header"><h2>Recent Properties</h2></div>
    <div class="property-grid" id="overviewPropertyGrid"></div>
  </div>

  <!-- Properties -->
  <div class="section" id="properties">
    <div class="section-header">
      <h2>My Properties</h2>
      <button class="btn-primary" id="addPropertyBtn"><i class='bx bx-plus'></i> Add Property</button>
    </div>
    <div class="property-grid" id="propertyGrid"></div>
  </div>

  <!-- Applications -->
  <div class="section" id="applications">
    <div class="section-header"><h2>Tenant Applications</h2></div>
    <div id="applicationListWrap"></div>
  </div>

  <!-- Tenants -->
  <div class="section" id="tenants">
    <div class="section-header"><h2>Tenants</h2></div>
    <div id="tenantTableWrap"></div>
  </div>
</div>

<!-- Add Property Modal -->
<div class="overlay" id="propertyOverlay">
  <div class="modal">
    <h2>Add Property</h2>
    <form id="propertyForm">
      <div class="field">
        <label>Title</label>
        <input type="text" id="pTitle" required placeholder="e.g. Modern Family House">
      </div>
      <div class="field-row">
        <div class="field" style="flex:1;">
          <label>Price ($)</label>
          <input type="number" id="pPrice" required placeholder="750000">
        </div>
        <div class="field" style="flex:1;">
          <label>Status</label>
          <select id="pStatus">
            <option>For Sale</option>
            <option>For Rent</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Location</label>
        <input type="text" id="pLocation" required placeholder="Austin, TX">
      </div>
      <div class="field-row">
        <div class="field" style="flex:1;">
          <label>Beds</label>
          <input type="number" id="pBeds" required placeholder="4">
        </div>
        <div class="field" style="flex:1;">
          <label>Baths</label>
          <input type="number" id="pBaths" required placeholder="2">
        </div>
        <div class="field" style="flex:1;">
          <label>Sqft</label>
          <input type="number" id="pSqft" required placeholder="2400">
        </div>
      </div>
      <div class="field">
        <label>Property Photos (1–20 photos — include interior and exterior shots)</label>
        <input type="file" id="pImage" accept="image/*" multiple>
        <div id="pImageCount" style="font-size:12px; margin-top:6px;"></div>
        <div id="pImagePreviewGrid" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="cancel-btn" id="cancelPropertyBtn">Cancel</button>
        <button type="submit" class="save-btn">List Property</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
// --- Toast helper ---
function showToast(message){
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3200);
}

// --- Auth guard ---
const currentUser = JSON.parse(localStorage.getItem('zeyriCurrentUser'));
if (!currentUser) {
  window.location.href = 'Login.html';
}
document.getElementById('welcomeMsg').textContent = currentUser ? `Welcome back, ${currentUser.fullName}!` : '';

document.getElementById('logoutBtn').addEventListener('click', function(){
  localStorage.removeItem('zeyriCurrentUser');
  window.location.href = 'index.html';
});

// --- Section navigation ---
document.querySelectorAll('.sidebar nav a[data-target]').forEach(link => {
  link.addEventListener('click', function(){
    document.querySelectorAll('.sidebar nav a[data-target]').forEach(l => l.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(this.dataset.target).classList.add('active');
    closeSidebar();
  });
});

// --- Mobile hamburger sidebar toggle ---
const sidebar = document.getElementById('sidebar');
const sidebarBackdrop = document.getElementById('sidebarBackdrop');
const dashToggle = document.getElementById('dashToggle');

function openSidebar(){
  sidebar.classList.add('show');
  sidebarBackdrop.classList.add('show');
}
function closeSidebar(){
  sidebar.classList.remove('show');
  sidebarBackdrop.classList.remove('show');
}
dashToggle.addEventListener('click', openSidebar);
sidebarBackdrop.addEventListener('click', closeSidebar);

// --- Property data ---
function getProperties(){
  return JSON.parse(localStorage.getItem('zeyriProperties')) || [];
}
function saveProperties(props){
  localStorage.setItem('zeyriProperties', JSON.stringify(props));
}

function renderProperties(){
  const props = getProperties();
  const grid = document.getElementById('propertyGrid');
  const overviewGrid = document.getElementById('overviewPropertyGrid');
  document.getElementById('statProperties').textContent = props.length;

  if (props.length === 0) {
    grid.innerHTML = '<div class="empty-state">No properties yet. Click "Add Property" to list your first one.</div>';
    overviewGrid.innerHTML = '<div class="empty-state">No properties yet.</div>';
    return;
  }

  const cardHTML = (p, i) => {
    const coverImage = (p.images && p.images.length > 0) ? p.images[0] : p.imageData;
    const photoCount = p.images ? p.images.length : (p.imageData ? 1 : 0);
    return `
    <div class="property-card" style="animation-delay:${i * 0.05}s">
      <div class="thumb" ${coverImage ? `style="background-image:url('${coverImage}'); background-size:cover; background-position:center;"` : ''}>
        ${!coverImage ? `<i class='bx bx-building-house'></i>` : ''}
        ${photoCount > 1 ? `<span style="position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.55); color:#fff; font-size:11px; padding:3px 8px; border-radius:10px;">${photoCount} photos</span>` : ''}
      </div>
      <div class="body">
        <span class="status-badge">${p.status}</span>
        <h3>${p.title}</h3>
        <div class="price">$${Number(p.price).toLocaleString()}</div>
        <div class="meta"><i class='bx bxs-map'></i> ${p.location} &middot; ${p.beds} bd &middot; ${p.baths} ba &middot; ${p.sqft} sqft</div>
        <div class="card-actions">
          <button class="delete-btn" onclick="deleteProperty(${p.id})">Delete</button>
        </div>
      </div>
    </div>`;
  };

  grid.innerHTML = props.map(cardHTML).join('');
  overviewGrid.innerHTML = props.slice(-3).reverse().map(cardHTML).join('');
}

function deleteProperty(id){
  const props = getProperties().filter(p => p.id !== id);
  saveProperties(props);
  renderProperties();
}

document.getElementById('addPropertyBtn').addEventListener('click', () => {
  document.getElementById('propertyOverlay').classList.add('active');
});
document.getElementById('cancelPropertyBtn').addEventListener('click', () => {
  document.getElementById('propertyOverlay').classList.remove('active');
  document.getElementById('propertyForm').reset();
  selectedPropertyImages = [];
  document.getElementById('pImagePreviewGrid').innerHTML = '';
  document.getElementById('pImageCount').textContent = '';
});
document.getElementById('propertyOverlay').addEventListener('click', function(e){
  if (e.target === this) this.classList.remove('active');
});

// Compress an uploaded image before storing it, so it doesn't blow past localStorage's limit.
// Resizes to a max width and re-encodes as JPEG at reduced quality. Returns a Promise.
function compressImageAsync(file, maxWidth, quality){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = Math.round(height * (maxWidth / width));
          width = maxWidth;
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

const MIN_PROPERTY_IMAGES = 1;
const MAX_PROPERTY_IMAGES = 20;
let selectedPropertyImages = []; // accumulates across multiple "Choose Files" picks

function renderImageCountLabel(){
  const countLabel = document.getElementById('pImageCount');
  const count = selectedPropertyImages.length;
  if (count === 0) {
    countLabel.textContent = '';
  } else if (count > MAX_PROPERTY_IMAGES) {
    countLabel.textContent = `${count} selected — max is ${MAX_PROPERTY_IMAGES}. Remove some below.`;
    countLabel.style.color = '#c0392b';
  } else {
    countLabel.textContent = `${count} photo${count === 1 ? '' : 's'} selected ✓`;
    countLabel.style.color = '#1e8449';
  }
}

function renderImagePreviewGrid(){
  const grid = document.getElementById('pImagePreviewGrid');
  grid.innerHTML = selectedPropertyImages.map((src, i) => `
    <div style="position:relative;">
      <img src="${src}" style="width:60px; height:60px; object-fit:cover; border-radius:6px; display:block;">
      <span onclick="removePropertyImage(${i})" style="position:absolute; top:-6px; right:-6px; background:#c0392b; color:#fff; width:18px; height:18px; border-radius:50%; font-size:12px; line-height:18px; text-align:center; cursor:pointer;">&times;</span>
    </div>
  `).join('');
}

function removePropertyImage(index){
  selectedPropertyImages.splice(index, 1);
  renderImageCountLabel();
  renderImagePreviewGrid();
}

// Each time photos are chosen, ADD them to the running list instead of replacing it
document.getElementById('pImage').addEventListener('change', async function(){
  const newFiles = Array.from(this.files);
  if (newFiles.length === 0) return;

  const room = MAX_PROPERTY_IMAGES - selectedPropertyImages.length;
  const filesToAdd = newFiles.slice(0, Math.max(room, 0));

  const newCompressed = await Promise.all(filesToAdd.map(f => compressImageAsync(f, 500, 0.6)));
  selectedPropertyImages.push(...newCompressed);

  if (newFiles.length > filesToAdd.length) {
    showToast(`⚠️ Only added ${filesToAdd.length} — you're capped at ${MAX_PROPERTY_IMAGES} total photos.`);
  }

  this.value = ''; // reset so choosing the same file(s) again still triggers change
  renderImageCountLabel();
  renderImagePreviewGrid();
});

document.getElementById('propertyForm').addEventListener('submit', async function(e){
  e.preventDefault();

  if (selectedPropertyImages.length < MIN_PROPERTY_IMAGES) {
    showToast(`⚠️ Please upload at least ${MIN_PROPERTY_IMAGES} photo before listing.`);
    return;
  }

  // Re-compress at higher quality for actual storage (previews above are smaller/lower quality for speed)
  const props = getProperties();
  props.push({
    id: Date.now(),
    title: document.getElementById('pTitle').value.trim(),
    price: document.getElementById('pPrice').value,
    status: document.getElementById('pStatus').value,
    location: document.getElementById('pLocation').value.trim(),
    beds: document.getElementById('pBeds').value,
    baths: document.getElementById('pBaths').value,
    sqft: document.getElementById('pSqft').value,
    images: selectedPropertyImages,
    imageData: selectedPropertyImages[0] || null
  });

  try {
    saveProperties(props);
  } catch (err) {
    showToast('⚠️ Storage limit reached. Try fewer/smaller photos, or delete an old property first.');
    return; // keep the modal open so they can retry instead of losing their input
  }

  renderProperties();
  document.getElementById('propertyForm').reset();
  selectedPropertyImages = [];
  document.getElementById('pImagePreviewGrid').innerHTML = '';
  document.getElementById('pImageCount').textContent = '';
  document.getElementById('propertyOverlay').classList.remove('active');

  // Switch to My Properties tab so the landlord sees it appear right away
  document.querySelectorAll('.sidebar nav a[data-target]').forEach(l => l.classList.remove('active'));
  document.querySelector('.sidebar nav a[data-target="properties"]').classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('properties').classList.add('active');

  showToast('🎉 Property listed successfully! It\'s now live on your public listings page.');
});

// --- Tenant data (populated when applications get approved) ---
function getTenants(){
  return JSON.parse(localStorage.getItem('zeyriTenants')) || [];
}
function saveTenants(tenants){
  localStorage.setItem('zeyriTenants', JSON.stringify(tenants));
}

// --- Application data ---
function getApplications(){
  return JSON.parse(localStorage.getItem('zeyriApplications')) || [];
}
function saveApplications(apps){
  localStorage.setItem('zeyriApplications', JSON.stringify(apps));
}

function renderApplications(){
  const apps = getApplications();
  const wrap = document.getElementById('applicationListWrap');
  const pendingCount = apps.filter(a => a.status === 'Pending').length;
  document.getElementById('statApplications').textContent = pendingCount;

  if (apps.length === 0) {
    wrap.innerHTML = '<div class="empty-state">No applications yet. They\'ll show up here once a tenant applies to one of your properties.</div>';
    return;
  }

  wrap.innerHTML = apps.map((a, i) => `
    <div class="application-card" style="animation-delay:${i * 0.05}s">
      <div class="info">
        <h3>${a.tenantName} <span style="font-weight:normal; color:#999; font-size:12px;">applied for</span> ${a.propertyTitle}</h3>
        <p><i class='bx bx-envelope'></i> ${a.tenantEmail} &middot; <i class='bx bx-phone'></i> ${a.tenantPhone}</p>
        <p><i class='bx bx-calendar'></i> Move-in: ${a.moveInDate || 'Not specified'}</p>
        ${a.message ? `<p><i class='bx bx-message-detail'></i> "${a.message}"</p>` : ''}
      </div>
      ${a.status === 'Pending' ? `
        <div class="actions">
          <button class="approve-btn" onclick="approveApplication(${a.id})">Approve</button>
          <button class="reject-btn" onclick="rejectApplication(${a.id})">Reject</button>
        </div>
      ` : `<span class="status-tag ${a.status.toLowerCase()}">${a.status}</span>`}
    </div>`).join('');
}

function approveApplication(id){
  const apps = getApplications();
  const app = apps.find(a => a.id === id);
  if (!app) return;
  app.status = 'Approved';
  saveApplications(apps);

  // Add them as an active tenant, linked by email so they can view their own rent status
  const nextDue = new Date();
  nextDue.setDate(nextDue.getDate() + 30);

  const tenants = getTenants();
  tenants.push({
    id: Date.now(),
    name: app.tenantName,
    email: app.tenantEmail,
    propertyId: app.propertyId,
    propertyTitle: app.propertyTitle,
    rentAmount: app.propertyPrice || 0,
    status: 'Pending',
    dueDate: nextDue.toISOString().split('T')[0],
    history: []
  });
  saveTenants(tenants);

  renderApplications();
  renderTenants();
}

function rejectApplication(id){
  const apps = getApplications();
  const app = apps.find(a => a.id === id);
  if (!app) return;
  app.status = 'Rejected';
  saveApplications(apps);
  renderApplications();
}

function daysUntil(dueDateStr){
  if (!dueDateStr) return null;
  const due = new Date(dueDateStr);
  const today = new Date();
  due.setHours(0,0,0,0);
  today.setHours(0,0,0,0);
  return Math.round((due - today) / (1000 * 60 * 60 * 24));
}

function dueLabel(tenant){
  if (!tenant.dueDate) return '<span style="color:#999;">No due date set</span>';
  const days = daysUntil(tenant.dueDate);
  if (tenant.status === 'Paid') return `<span style="color:#1e8449;">Paid &middot; next due ${tenant.dueDate}</span>`;
  if (days < 0) return `<span style="color:#c0392b; font-weight:bold;">Overdue by ${Math.abs(days)} day${Math.abs(days) === 1 ? '' : 's'}</span>`;
  if (days === 0) return `<span style="color:#b8860b; font-weight:bold;">Due today</span>`;
  return `<span style="color:#b8860b;">Due in ${days} day${days === 1 ? '' : 's'}</span>`;
}

function recentPaymentNote(t){
  if (t.status !== 'Paid' || !t.history || t.history.length === 0) return { note: '', recent: false };
  const lastEntry = t.history.find(h => h.status === 'Paid');
  if (!lastEntry) return { note: '', recent: false };

  const paidDate = new Date(lastEntry.date);
  const today = new Date();
  paidDate.setHours(0,0,0,0);
  today.setHours(0,0,0,0);
  const daysAgo = Math.round((today - paidDate) / (1000 * 60 * 60 * 24));

  let label;
  if (daysAgo <= 0) label = 'Paid today';
  else if (daysAgo === 1) label = 'Paid yesterday';
  else label = `Paid ${daysAgo} days ago`;

  return { note: label, recent: daysAgo <= 3 };
}

function renderTenants(){
  const tenants = getTenants();

  // Auto-flip to Overdue if the due date has passed and it's still unpaid
  let changed = false;
  tenants.forEach(t => {
    if (t.dueDate && t.status !== 'Paid') {
      const days = daysUntil(t.dueDate);
      if (days < 0 && t.status !== 'Overdue') {
        t.status = 'Overdue';
        changed = true;
      }
    }
  });
  if (changed) saveTenants(tenants);

  document.getElementById('statTenants').textContent = tenants.length;
  const wrap = document.getElementById('tenantTableWrap');

  if (tenants.length === 0) {
    wrap.innerHTML = '<div class="empty-state">No tenants yet. This will populate once the Tenant Applications feature is connected.</div>';
    return;
  }

  wrap.innerHTML = `
    <table>
      <thead><tr><th>Name</th><th>Property</th><th>Rent</th><th>Status</th><th>Next Payment</th><th>Update</th></tr></thead>
      <tbody>
        ${tenants.map(t => {
          const { note, recent } = recentPaymentNote(t);
          return `
          <tr style="${recent ? 'background:#f3fbf5;' : ''}">
            <td>${t.name}</td>
            <td>${t.propertyTitle}</td>
            <td>$${Number(t.rentAmount).toLocaleString()}</td>
            <td>
              <span class="rent-status ${t.status.toLowerCase()}">${t.status}</span>
              ${recent ? `<div style="font-size:11px; color:#1e8449; margin-top:4px;">🔔 ${note}</div>` : ''}
            </td>
            <td style="font-size:12px;">${dueLabel(t)}</td>
            <td>
              <select onchange="updateTenantStatus(${t.id}, this.value)" style="padding:5px 8px; border-radius:6px; border:1px solid #ddd; font-size:12px;">
                <option value="Paid" ${t.status === 'Paid' ? 'selected' : ''}>Paid</option>
                <option value="Pending" ${t.status === 'Pending' ? 'selected' : ''}>Pending</option>
                <option value="Overdue" ${t.status === 'Overdue' ? 'selected' : ''}>Overdue</option>
              </select>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function updateTenantStatus(id, newStatus){
  const tenants = getTenants();
  const tenant = tenants.find(t => t.id === id);
  if (!tenant) return;

  tenant.status = newStatus;
  if (!tenant.history) tenant.history = [];
  tenant.history.unshift({
    date: new Date().toISOString().split('T')[0],
    status: newStatus
  });

  // When marked Paid, roll the due date forward to the next cycle (30 days out)
  if (newStatus === 'Paid') {
    const nextDue = new Date();
    nextDue.setDate(nextDue.getDate() + 30);
    tenant.dueDate = nextDue.toISOString().split('T')[0];
    markPropertyRented(tenant.propertyId);
  }

  saveTenants(tenants);
  renderTenants();
}

function markPropertyRented(propertyId){
  if (!propertyId) return;
  const rented = JSON.parse(localStorage.getItem('zeyriRentedProperties')) || [];
  if (!rented.includes(propertyId)) {
    rented.push(propertyId);
    localStorage.setItem('zeyriRentedProperties', JSON.stringify(rented));
  }
}

renderProperties();
renderApplications();
renderTenants();
</script>
